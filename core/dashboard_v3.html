<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHION | Visual Singularity</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbit&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-magenta: #f64f59;
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0f 100%);
        }

        .ambient-light {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(157, 80, 187, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-20%, -20%);
            }

            to {
                transform: translate(40%, 40%);
            }
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
        }

        .logo {
            font-family: 'Orbit', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 1.5rem;
            padding: 2rem;
            height: calc(100vh - 120px);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Orbit';
        }

        .pulse-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            margin: auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.2);
            transition: 0.5s;
        }

        .pulse-inner {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-blue), var(--neon-purple));
            opacity: 0.8;
            filter: blur(10px);
        }

        .beating {
            animation: beat 1s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes beat {
            to {
                transform: scale(1.15);
                opacity: 1;
                filter: blur(2px);
                box-shadow: 0 0 80px rgba(157, 80, 187, 0.5);
            }
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 1rem;
            border-top: 1px solid var(--glass);
            padding-top: 1rem;
        }

        .log-item {
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .log-item.success {
            color: #00ff88;
        }

        .log-item.info {
            color: #00d2ff;
        }

        .chart-box {
            height: 150px;
        }
    </style>
</head>

<body>
    <div class="ambient-light"></div>
    <header>
        <div class="logo">SHION / VISUAL SINGULARITY</div>
        <div id="status-tag"
            style="font-size: 0.8rem; background: #00ff88; color: black; padding: 0.2rem 0.8rem; border-radius: 10px;">
            RESONATING</div>
    </header>

    <div class="container">
        <!-- Stats Panel -->
        <div class="card">
            <div>
                <div class="stat-label">Energy Pulse (ATP)</div>
                <div id="atp-value" class="stat-value">--</div>
            </div>
            <div style="margin-top: 2rem;">
                <div class="stat-label">Chaos Entropy</div>
                <div id="entropy-value" class="stat-value">--</div>
            </div>
            <div class="chart-box" style="margin-top: auto;">
                <canvas id="statChart"></canvas>
            </div>
        </div>

        <!-- Center Visualization -->
        <div class="card" style="justify-content: center; align-items: center; background: none; border: none;">
            <div id="pulse-core" class="pulse-circle">
                <div class="pulse-inner"></div>
            </div>
            <div style="margin-top: 2rem; text-align: center;">
                <div class="stat-label">Current Action</div>
                <div id="current-action" style="font-size: 1.2rem; font-weight: 500;">WAITING FOR PULSE...</div>
            </div>
        </div>

        <!-- Resonance & History -->
        <div class="card">
            <div class="stat-label">Resonance Field</div>
            <div id="resonance-value" style="font-size: 2rem; font-weight: 700; color: var(--neon-blue);">--</div>

            <div class="stat-label" style="margin-top: 2rem;">Neural Logs</div>
            <div class="log-container" id="log-container">
                <div class="log-item info">[SYSTEM] Initializing Visual Gateway...</div>
            </div>
        </div>
    </div>

    <script>
        // --- Dashboard Logic ---
        const logs = document.getElementById('log-container');
        function addLog(msg, type = 'info') {
            const di = document.createElement('div');
            di.className = `log-item ${type}`;
            di.innerText = `> ${msg}`;
            logs.insertBefore(di, logs.firstChild);
        }

        async function updateData() {
            try {
                // visual_pulse_api.py에서 데이터를 가져옴
                const response = await fetch('/api/status');
                const data = await response.json();

                document.getElementById('atp-value').innerText = data.atp.toFixed(1);
                document.getElementById('entropy-value').innerText = data.entropy.toFixed(3);
                document.getElementById('resonance-value').innerText = (data.resonance * 100).toFixed(1) + '%';
                document.getElementById('current-action').innerText = data.last_action || 'ZEN MODE';

                if (data.pulse_active) {
                    document.getElementById('pulse-core').classList.add('beating');
                } else {
                    document.getElementById('pulse-core').classList.remove('beating');
                }

                if (data.new_logs) {
                    data.new_logs.forEach(l => addLog(l.msg, l.type));
                }

                updateChart(data.atp, data.entropy);
            } catch (e) {
                console.error("Connection lost to Shion Core:", e);
            }
        }

        // --- Chart ---
        const ctx = document.getElementById('statChart').getContext('2d');
        const statChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(10).fill(''),
                datasets: [{
                    label: 'ATP',
                    borderColor: '#00d2ff',
                    data: Array(10).fill(0),
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { x: { display: false }, y: { display: false } },
                plugins: { legend: { display: false } }
            }
        });

        function updateChart(atp, entropy) {
            statChart.data.datasets[0].data.push(atp);
            statChart.data.datasets[0].data.shift();
            statChart.update('none');
        }

        setInterval(updateData, 2000);
    </script>
</body>

</html>
